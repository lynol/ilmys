<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — ILMYS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #F0FDF4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
        }
        .login-card {
            background: #fff;
            border-radius: 8px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            border-top: 3px solid #16A34A;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        .login-logo {
            font-size: 28px;
            letter-spacing: 4px;
            color: #111827;
            font-family: 'Georgia', serif;
            text-align: center;
            margin-bottom: 4px;
        }
        .login-sub {
            font-size: 11px;
            letter-spacing: 2px;
            color: #9CA3AF;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 32px;
        }
        .form-label {
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #111827;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .form-control {
            border: 1px solid #E5E7EB;
            border-radius: 4px;
            padding: 11px 14px;
            font-size: 14px;
            color: #111827;
        }
        .form-control:focus {
            border-color: #16A34A;
            box-shadow: none;
        }
        .btn-login {
            width: 100%;
            background: #16A34A;
            color: #fff;
            border: none;
            padding: 13px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 8px;
            transition: background .2s;
        }
        .btn-login:hover { background: #15803D; }
        .alert-error {
            background: rgba(220,38,38,.08);
            color: #DC2626;
            border-left: 3px solid #DC2626;
            padding: 12px 16px;
            font-size: 13px;
            margin-bottom: 20px;
            border-radius: 2px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #9CA3AF;
            text-decoration: none;
        }
        .back-link:hover { color: #16A34A; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">ILMYS</div>
        <div class="login-sub">Espace Administration</div>

        {% with messages = get_flashed_messages(
            with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="alert-{{ category }}">
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Identifiant</label>
                <input type="text" name="username"
                       class="form-control"
                       placeholder="admin"
                       required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password"
                       class="form-control"
                       placeholder="••••••••"
                       required>
            </div>
            <button type="submit" class="btn-login">
                Se connecter →
            </button>
        </form>

        <div class="text-center mt-2">
            <a href="{{ url_for('admin_reset_request') }}"
            style="font-size:13px;color:var(--muted)">
                Mot de passe oublié ?
            </a>
        </div>

        <a href="{{ url_for('index') }}" class="back-link">
            ← Retour au site
        </a>
    </div>
</body>
</html>
