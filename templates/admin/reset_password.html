<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe — ILMYS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body style="background:#F8FAFC;min-height:100vh">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-5">

                <div class="text-center mb-4">
                    <a href="/" class="ilmys-logo"
                       style="font-size:28px;text-decoration:none">
                        ILMYS
                    </a>
                    <p class="text-muted mt-1" style="font-size:13px">
                        Créer un nouveau mot de passe
                    </p>
                </div>

                <div class="admin-card p-4">

                    {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }}
                                    py-2 px-3 mb-3"
                             style="font-size:13px;border-radius:6px">
                            {{ message }}
                        </div>
                        {% endfor %}
                    {% endif %}
                    {% endwith %}

                    <form method="POST">
                        <div class="mb-3">
                            <label class="admin-label">
                                Nouveau mot de passe *
                            </label>
                            <input type="password" name="password"
                                   class="admin-input"
                                   placeholder="8 caractères minimum"
                                   required>
                        </div>

                        <div class="mb-4">
                            <label class="admin-label">
                                Confirmer *
                            </label>
                            <input type="password" name="confirm"
                                   class="admin-input"
                                   placeholder="Répète le mot de passe"
                                   required>
                        </div>

                        <button type="submit"
                                class="btn ilmys-btn-cta w-100">
                            Mettre à jour le mot de passe
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
