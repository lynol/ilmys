<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XX8D8EQ0Z6"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-XX8D8EQ0Z6');
    </script>

    <!-- ─── TITRE ─── -->
    <title>{% block title %}ILMYS — Données · Analyses · Afrique{% endblock %}</title>

    <!-- ─── META DE BASE ─── -->
    <meta name="description" content="{% block meta_description %}ILMYS analyse et visualise les données publiques africaines pour informer les citoyens, les journalistes et les décideurs. Gratuitement. Rigoureusement.{% endblock %}">
    <meta name="author" content="ILMYS">
    <meta name="robots" content="index, follow">

    <!-- ─── OPEN GRAPH (Facebook, LinkedIn, WhatsApp) ─── -->
    <meta property="og:type" content="{% block og_type %}website{% endblock %}">
    <meta property="og:site_name" content="ILMYS">
    <meta property="og:title" content="{% block og_title %}ILMYS — Données · Analyses · Afrique{% endblock %}">
    <meta property="og:description" content="{% block og_description %}ILMYS analyse et visualise les données publiques africaines pour informer les citoyens, les journalistes et les décideurs.{% endblock %}">
    <meta property="og:image" content="{% block og_image %}{{ request.host_url }}static/assets/og-default.png{% endblock %}">
    <meta property="og:url" content="{{ request.url }}">
    <meta property="og:locale" content="fr_FR">

    <!-- ─── TWITTER CARD ─── -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@ilmys_data">
    <meta name="twitter:title" content="{% block twitter_title %}ILMYS — Données · Analyses · Afrique{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}ILMYS analyse et visualise les données publiques africaines.{% endblock %}">
    <meta name="twitter:image" content="{% block twitter_image %}{{ request.host_url }}static/assets/og-default.png{% endblock %}">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS ILMYS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    {% include 'components/navbar.html' %}
    {% block content %}{% endblock %}
    {% include 'components/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
